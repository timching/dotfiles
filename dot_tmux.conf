# Periwinkle Hush theme — generated from ~/Sandbox/theme
# -q: silently skip if the theme file isn't present on this machine
source-file -q "~/Sandbox/theme/release/Periwinkle Hush.tmux.conf"

##### Vim-friendly navigation #####

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Splits that make sense #####

# | for vertical, - for horizontal (open in current directory)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window also opens in current directory
bind c new-window -c "#{pane_current_path}"

##### Floating popups (tmux 3.2+) #####

# Scratch terminal
bind ` display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Lazygit in a popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# htop in a popup
bind T display-popup -E -w 80% -h 80% "htop"

# Create a new session (prompts for name)
bind N command-prompt -p "new session:" "new-session -s '%%'"

##### Quick window access #####

# Alt+number to jump to window (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Even out pane sizes (horizontal / vertical)
bind = select-layout even-horizontal
bind + select-layout even-vertical

##### Quality of life #####

# Reload config easily
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
